<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سينما فلوكس | CinemaFlux</title>
    <style>
        /* المتغيرات الأساسية للألوان - تدعم الوضع الفاتح والغامق بشكل ديناميكي */
        :root {
            --bg-main: #0b1116;
            --bg-surface: #06090c;
            --bg-card: #121b22;
            --border-color: #1c252d;
            --text-main: #ffffff;
            --text-sub: #9aa6b1;
            --accent: #e50914;
            --nav-bg: #06090c;
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --border-color: #dcdcdc;
            --text-main: #1a1a1a;
            --text-sub: #65676b;
            --accent: #e50914;
            --nav-bg: #ffffff;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden; margin: 0; padding: 0;
            background-color: var(--bg-main); color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* شريط التنقل العلوي الثابت مع حماية لتجويف الشاشة في الهواتف الحديثة */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 65px;
            background-color: var(--nav-bg); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; padding-top: env(safe-area-inset-top, 0px);
            z-index: 1000; transition: background 0.3s, border 0.3s;
        }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 0.5px; text-decoration: none; }
        
        /* زر الحساب بتصميم مستدير وأنيق */
        .profile-trigger {
            width: 38px; height: 38px; border-radius: 50%;
            background-color: var(--bg-card); border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-main); transition: 0.2s;
        }
        .profile-trigger:hover { border-color: var(--accent); }

        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-btn {
            background: none; border: none; color: var(--text-main);
            font-size: 20px; width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .nav-btn:hover { background-color: var(--bg-card); }

        /* منطقة المحتوى الرئيسي تحت الهيدر الثابت */
        .main-content { margin-top: calc(75px + env(safe-area-inset-top, 0px)); padding-bottom: 90px; }

        /* شريط تصنيفات الأزرار العلوية السريعة */
        .tags-scroll {
            display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 12px 16px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .tags-scroll::-webkit-scrollbar { display: none; }
        .tag-pill {
            background-color: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 8px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: 0.2s;
        }
        .tag-pill.active { background-color: var(--accent); border-color: var(--accent); color: #fff; }

        /* لوحة العرض المميز البانر التلقائي المتحرك */
        .featured-banner {
            margin: 0 16px 25px 16px; height: 220px; border-radius: 12px;
            position: relative; overflow: hidden; background-size: cover; background-position: center;
            display: flex; align-items: flex-end; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .banner-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(6,9,12,1) 0%, rgba(6,9,12,0.7) 40%, transparent 100%);
        }
        .banner-details { position: relative; z-index: 2; padding: 16px; width: 100%; box-sizing: border-box; }
        .banner-title { font-size: 20px; font-weight: 800; margin: 0 0 6px 0; color: #fff; }
        .banner-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #e50914; font-weight: bold; }
        .banner-rating { background: #28a745; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        /* هيكلة الأقسام والصفوف الأفقية المرنة */
        .section-container { margin-bottom: 25px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; margin-bottom: 12px;
        }
        .section-title { font-size: 16px; font-weight: 800; border-right: 4px solid var(--accent); padding-right: 8px; margin: 0; }
        .movie-row {
            display: flex; gap: 12px; overflow-x: auto; padding: 0 16px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .movie-row::-webkit-scrollbar { display: none; }

        /* بطاقة الفيلم الذكية المحسنة */
        .movie-card {
            flex: 0 0 115px; width: 115px; cursor: pointer; position: relative;
            transition: transform 0.2s;
        }
        .movie-card:active { transform: scale(0.96); }
        .poster-wrapper {
            width: 100%; height: 165px; border-radius: 8px; overflow: hidden;
            background-color: var(--bg-card); border: 1px solid var(--border-color); position: relative;
        }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .card-rating {
            position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.75);
            color: #ffc107; font-size: 10px; font-weight: bold; padding: 2px 5px;
            border-radius: 4px; display: flex; align-items: center; gap: 2px;
            backdrop-filter: blur(2px);
        }
        .card-type {
            position: absolute; bottom: 6px; right: 6px; background: var(--accent);
            color: white; font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 4px;
        }
        .movie-title {
            font-size: 12px; font-weight: 600; margin: 6px 0 0 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-main); text-align: center;
        }

        /* شريط التنقل السفلي الثابت للهواتف والأجهزة الذكية */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
            background-color: var(--nav-bg); border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom, 0px); z-index: 1000;
        }
        .bar-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-sub); text-decoration: none; font-size: 10px; font-weight: 600; gap: 4px;
            background: none; border: none; cursor: pointer; flex: 1; height: 100%;
        }
        .bar-item i { font-size: 18px; }
        .bar-item.active { color: var(--accent); }

        /* واجهة مشغل الفيديو المنبثقة بكامل الشاشة */
        .player-modal {
            position: fixed; inset: 0; background-color: #000; z-index: 2000;
            display: none; flex-direction: column; padding-top: env(safe-area-inset-top, 0px);
        }
        .player-header {
            height: 50px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; border-bottom: 1px solid #1c252d; background-color: #06090c;
        }
        .player-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .player-title { font-size: 14px; font-weight: bold; color: #fff; margin: 0; }
        .iframe-container { flex: 1; width: 100%; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* تفاصيل الفيلم السفلية داخل المشغل */
        .player-body {
            background-color: #06090c; padding: 16px; max-height: 40vh; overflow-y: auto;
            border-top: 1px solid #1c252d; box-sizing: border-box;
        }
        .player-desc { font-size: 13px; color: #9aa6b1; line-height: 1.6; margin: 0 0 15px 0; text-align: justify; }
        
        /* طاقم التمثيل المطور داخل مشغل الفيديو */
        .cast-section { margin-top: 15px; }
        .cast-title { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 10px; display: block; }
        .cast-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .cast-row::-webkit-scrollbar { display: none; }
        .cast-item { flex: 0 0 65px; width: 65px; text-align: center; }
        .cast-img-wrapper { width: 50px; height: 50px; border-radius: 50%; overflow: hidden; margin: 0 auto 5px auto; border: 1px solid #1c252d; }
        .cast-img { width: 100%; height: 100%; object-fit: cover; }
        .cast-name { font-size: 10px; color: #9aa6b1; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* واجهة الحساب والمودال المنبثق الأنيق */
        .modal-overlay {
            position: fixed; inset: 0; background-color: rgba(0,0,0,0.85);
            z-index: 1500; display: none; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .custom-modal {
            background-color: var(--bg-surface); border: 1px solid var(--border-color);
            width: 100%; max-width: 400px; border-radius: 12px; padding: 24px; box-sizing: border-box;
            position: relative; text-align: center;
        }
        .modal-close-btn { position: absolute; top: 12px; left: 12px; background: none; border: none; color: var(--text-sub); font-size: 20px; cursor: pointer; }
        .modal-icon { font-size: 45px; color: var(--accent); margin-bottom: 15px; }
        .modal-h2 { font-size: 18px; font-weight: 800; margin: 0 0 8px 0; }
        .modal-p { font-size: 13px; color: var(--text-sub); margin: 0 0 20px 0; line-height: 1.5; }
        .modal-input {
            width: 100%; padding: 12px; border-radius: 8px; background-color: var(--bg-card);
            border: 1px solid var(--border-color); color: var(--text-main); font-size: 14px;
            outline: none; box-sizing: border-box; margin-bottom: 15px; text-align: center;
        }
        .modal-input:focus { border-color: var(--accent); }
        .modal-btn {
            background-color: var(--accent); color: white; border: none; width: 100%;
            padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .modal-btn:hover { opacity: 0.9; }

        /* واجهة البحث المتطورة المدمجة بكامل الشاشة */
        .search-page {
            position: fixed; inset: 0; background-color: var(--bg-main); z-index: 1100;
            display: none; flex-direction: column; padding-top: env(safe-area-inset-top, 0px);
        }
        .search-header {
            height: 65px; display: flex; align-items: center; gap: 12px; padding: 0 16px;
            border-bottom: 1px solid var(--border-color); background-color: var(--nav-bg);
        }
        .search-box-wrapper { flex: 1; position: relative; }
        .search-input-field {
            width: 100%; padding: 10px 35px 10px 12px; border-radius: 20px;
            background-color: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-main); font-size: 14px; outline: none; box-sizing: border-box;
        }
        .search-input-field:focus { border-color: var(--accent); }
        .search-icon-inside { position: absolute; top: 50%; right: 12px; transform: translateY(-50%); color: var(--text-sub); font-size: 14px; }
        .search-results-container { flex: 1; overflow-y: auto; padding: 16px; }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }

        /* إضافة الفونت أوسم عبر الـ CDN لدعم الأيقونات بالشكل الصحيح */
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-right">
            <div class="profile-trigger" onclick="openProfileModal()">
                <i class="fa-solid声明 fa-user"></i>
            </div>
            <a href="#" class="logo" id="logoText">CinemaFlux</a>
        </div>
        <div class="nav-left">
            <button class="nav-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
            <button class="nav-btn" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i></button>
        </div>
    </nav>

    <main class="main-content" id="mainSection">
        <div class="tags-scroll" id="quickTagsContainer"></div>

        <div class="featured-banner" id="heroBanner" onclick="openHeroPlayer()">
            <div class="banner-overlay"></div>
            <div class="banner-details" id="heroDetails"></div>
        </div>

        <div id="dynamicSectionsContainer"></div>
    </main>

    <div class="search-page" id="searchPage">
        <div class="search-header">
            <button class="player-close" onclick="closeSearchPage()"><i class="fa-solid fa-arrow-right"></i></button>
            <div class="search-box-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon-inside"></i>
                <input type="text" class="search-input-field" id="searchInputField" oninput="executeSearchFilter()" placeholder="ابحث عن فيلم أو مسلسل...">
            </div>
        </div>
        <div class="search-results-container">
            <div class="search-grid" id="searchGridResults"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="bar-item active" id="btnHome" onclick="switchTab('home')">
            <i class="fa-solid fa-house"></i>
            <span id="txtHome">الرئيسية</span>
        </button>
        <button class="bar-item" id="btnSearch" onclick="openSearchPage()">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span id="txtSearch">البحث</span>
        </button>
        <button class="bar-item" id="btnShare" onclick="shareAppAction()">
            <i class="fa-solid fa-share-nodes"></i>
            <span id="txtShare">نشر التطبيق</span>
        </button>
    </div>

    <div class="player-modal" id="playerModal">
        <div class="player-header">
            <button class="player-close" onclick="closePlayerModal()"><i class="fa-solid fa-xmark"></i></button>
            <h4 class="player-title" id="playerMediaTitle">جاري التحميل...</h4>
            <div style="width:24px;"></div>
        </div>
        <div class="iframe-container" id="playerIframeContainer"></div>
        <div class="player-body">
            <p class="player-desc" id="playerMediaDesc"></p>
            <div class="cast-section" id="playerCastSection">
                <span class="cast-title" id="playerCastTitle">طاقم العمل والتمثيل:</span>
                <div class="cast-row" id="playerCastRow"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal" onclick="closeProfileModalOnOverlay(event)">
        <div class="custom-modal">
            <button class="modal-close-btn" onclick="closeProfileModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-icon"><i class="fa-solid fa-id-card-clip"></i></div>
            <h2 class="modal-h2" id="profileTitle">عضوية سينما فلوكس</h2>
            <p class="modal-p" id="profileSub">سجل دخولك لحفظ بياناتك والحصول على ميزات العضوية المميزة مجاناً!</p>
            <div id="profileFormBlock">
                <input type="text" class="modal-input" id="usernameInput" placeholder="اسم المستخدم...">
                <button class="modal-btn" id="profileSubmitBtn" onclick="submitProfileAuth()">دخول وتسجيل 🚀</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>

    <script>
        // نظام اللغات والترجمة المتكامل للموقع لضمان العالمية وسلاسة الواجهة
        const translations = {
            ar: {
                logo: "سينما فلوكس",
                txtHome: "الرئيسية",
                txtSearch: "البحث",
                txtShare: "نشر التطبيق",
                searchPlaceholder: "ابحث عن اسم فيلم أو مسلسل...",
                all: "الكل",
                movies: "الأفلام",
                series: "المسلسلات",
                castTitle: "طاقم العمل والتمثيل:",
                userDefaultTitle: "عضوية سينما فلوكس",
                userDefaultSub: "سجل دخولك لحفظ بياناتك والحصول على ميزات العضوية المميزة مجاناً!",
                btnLogin: "دخول وتسجيل 🚀",
                btnLogout: "تسجيل الخروج 🚪",
                usernamePlaceholder: "اسم المستخدم..."
            },
            en: {
                logo: "CinemaFlux",
                txtHome: "Home",
                txtSearch: "Search",
                txtShare: "Share App",
                searchPlaceholder: "Search movie or series by name...",
                all: "All",
                movies: "Movies",
                series: "Series",
                castTitle: "Cast & Acting Crew:",
                userDefaultTitle: "CinemaFlux Membership",
                userDefaultSub: "Log in to save your configurations and enjoy full premium access for free!",
                btnLogin: "Login & Register 🚀",
                btnLogout: "Logout 🚪",
                usernamePlaceholder: "Enter your username..."
            }
        };

        let currentLang = localStorage.getItem('flux_lang') || 'ar';
        let currentTheme = localStorage.getItem('flux_theme') || 'dark';
        let currentFilter = 'all'; 
        let heroMovieGlobal = null; 

        // إعداد البداية الفورية للموقع وتطبيق اللغات والتصنيفات والأقسام التلقائية
        window.addEventListener('DOMContentLoaded', () => {
            initLanguage();
            initTheme();
            renderQuickFilterTags();
            buildDynamicSectionsAndRows();
            autoSetupHeroBanner();
        });

        function initLanguage() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('mainHtml').setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('mainHtml').setAttribute('lang', currentLang);

            const dict = translations[currentLang];
            document.getElementById('logoText').innerText = dict.logo;
            document.getElementById('txtHome').innerText = dict.txtHome;
            document.getElementById('txtSearch').innerText = dict.txtSearch;
            document.getElementById('txtShare').innerText = dict.txtShare;
            document.getElementById('searchInputField').placeholder = dict.searchPlaceholder;
            
            updateProfileModalUI();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('flux_lang', currentLang);
            initLanguage();
            renderQuickFilterTags();
            buildDynamicSectionsAndRows();
            autoSetupHeroBanner();
        }

        function initTheme() {
            document.body.setAttribute('data-theme', currentTheme);
            const icon = document.getElementById('themeIcon');
            if(currentTheme === 'light') {
                icon.className = "fa-solid fa-sun";
            } else {
                icon.className = "fa-solid fa-moon";
            }
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('flux_theme', currentTheme);
            initTheme();
        }

        // بناء وضبط أزرار التصفية والفلترة السريعة العلوية
        function renderQuickFilterTags() {
            const container = document.getElementById('quickTagsContainer');
            const dict = translations[currentLang];
            
            const tags = [
                { id: 'all', label: dict.all },
                { id: 'movie', label: dict.movies },
                { id: 'series', label: dict.series }
            ];

            container.innerHTML = tags.map(t => `
                <div class="tag-pill ${currentFilter === t.id ? 'active' : ''}" onclick="setQuickFilter('${t.id}')">${t.label}</div>
            `).join('');
        }

        function setQuickFilter(filterId) {
            currentFilter = filterId;
            renderQuickFilterTags();
            buildDynamicSectionsAndRows();
        }

        // الإعداد الذكي والتلقائي لأفلام البانر الرئيسي المتحرك (يختار أعلى الأفلام تقييماً)
        function autoSetupHeroBanner() {
            if(!window.globalMoviesData || globalMoviesData.length === 0) return;
            
            const sorted = [...globalMoviesData].sort((a,b) => parseFloat(b.rating) - parseFloat(a.rating));
            const topMedia = sorted[0];
            heroMovieGlobal = topMedia;

            const banner = document.getElementById('heroBanner');
            banner.style.backgroundImage = `url('${topMedia.poster}')`;

            const details = document.getElementById('heroDetails');
            details.innerHTML = `
                <h2 class="banner-title">${topMedia.title}</h2>
                <div class="banner-meta">
                    <span class="banner-rating"><i class="fa-solid fa-star"></i> ${topMedia.rating}</span>
                    <span>${topMedia.type === 'movie' ? (currentLang === 'ar' ? 'فيلم مميز' : 'Featured Movie') : (currentLang === 'ar' ? 'مسلسل مميز' : 'Featured Series')}</span>
                </div>
            `;
        }

        function openHeroPlayer() {
            if(heroMovieGlobal) launchVideoPlayerModal(heroMovieGlobal);
        }

        // الدالة المعدلة والمسؤولة عن تقسيم وفصل التصنيفات المتعددة من النص تلقائياً
        function groupMoviesByGenre(movies) {
            const genresMap = {};
            movies.forEach(movie => {
                if (movie.genre) {
                    // تقسيم النص البرمجي للتصنيف إلى كلمات منفصلة بناءً على المسافات لمنع الاندماج والتكرار
                    const individualGenres = movie.genre.trim().split(/\s+/);
                    
                    individualGenres.forEach(singleGenre => {
                        if (singleGenre) {
                            if (!genresMap[singleGenre]) {
                                genresMap[singleGenre] = [];
                            }
                            // التأكد من عدم تكرار الفيلم داخل نفس القسم
                            if (!genresMap[singleGenre].includes(movie)) {
                                genresMap[singleGenre].push(movie);
                            }
                        }
                    });
                } else {
                    const fallback = currentLang === 'ar' ? "عام" : "General";
                    if (!genresMap[fallback]) genresMap[fallback] = [];
                    genresMap[fallback].push(movie);
                }
            });
            return genresMap;
        }

        // بناء الأقسام والصفوف الأفقية التفاعلية بناءً على قاعدة البيانات المحدثة والتصنيفات المنفصلة
        function buildDynamicSectionsAndRows() {
            const container = document.getElementById('dynamicSectionsContainer');
            container.innerHTML = "";

            if(!window.globalMoviesData || globalMoviesData.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding:20px; color:var(--text-sub);">No content available</p>`;
                return;
            }

            // فلترة المحتوى بناءً على التبويب المختار (الكل / أفلام / مسلسلات)
            let filteredData = globalMoviesData;
            if(currentFilter !== 'all') {
                filteredData = globalMoviesData.filter(m => m.type === currentFilter);
            }

            // تجميع الأفلام حسب التصنيفات الفردية بعد التعديل الجديد
            const grouped = groupMoviesByGenre(filteredData);

            for(const genreName in grouped) {
                const moviesInGenre = grouped[genreName];
                if(moviesInGenre.length === 0) continue;

                const section = document.createElement('div');
                section.className = "section-container";

                const header = document.createElement('div');
                header.className = "section-header";
                header.innerHTML = `<h3 class="section-title">${genreName}</h3>`;

                const row = document.createElement('div');
                row.className = "movie-row";

                moviesInGenre.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = "movie-card";
                    card.onclick = () => launchVideoPlayerModal(movie);

                    const typeBadge = movie.type === 'movie' ? (currentLang === 'ar' ? 'فيلم' : 'Movie') : (currentLang === 'ar' ? 'مسلسل' : 'Series');

                    card.innerHTML = `
                        <div class="poster-wrapper">
                            <img class="poster-img" src="${movie.poster}" alt="${movie.title}" loading="lazy">
                            <div class="card-rating"><i class="fa-solid fa-star"></i> ${movie.rating}</div>
                            <div class="card-type">${typeBadge}</div>
                        </div>
                        <h4 class="movie-title">${movie.title}</h4>
                    `;
                    row.appendChild(card);
                });

                section.appendChild(header);
                section.appendChild(row);
                container.appendChild(section);
            }
        }

        // تشغيل واجهة مشغل الفيديو المنبثقة وبناء طاقم العمل بمرونة كاملة
        function launchVideoPlayerModal(movie) {
            document.getElementById('playerMediaTitle').innerText = movie.title;
            document.getElementById('playerMediaDesc').innerText = movie.desc;
            document.getElementById('playerCastTitle').innerText = translations[currentLang].castTitle;

            const iframeContainer = document.getElementById('playerIframeContainer');
            iframeContainer.innerHTML = movie.hdUrl; 

            const castRow = document.getElementById('playerCastRow');
            castRow.innerHTML = "";

            if(movie.cast && movie.cast.length > 0) {
                document.getElementById('playerCastSection').style.display = "block";
                movie.cast.forEach(actor => {
                    const actorDiv = document.createElement('div');
                    actorDiv.className = "cast-item";
                    actorDiv.innerHTML = `
                        <div class="cast-img-wrapper">
                            <img class="cast-img" src="${actor.image}" alt="${actor.name}" loading="lazy">
                        </div>
                        <span class="cast-name">${actor.name}</span>
                    `;
                    castRow.appendChild(actorDiv);
                });
            } else {
                document.getElementById('playerCastSection').style.display = "none";
            }

            document.getElementById('playerModal').style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        function closePlayerModal() {
            document.getElementById('playerModal').style.display = "none";
            document.getElementById('playerIframeContainer').innerHTML = ""; 
            document.body.style.overflow = "auto";
        }

        // نظام البحث والفلترة الذكي واللحظي بكامل الشاشة
        function openSearchPage() {
            document.getElementById('searchPage').style.display = "flex";
            document.getElementById('searchInputField').focus();
            document.body.style.overflow = "hidden";
            executeSearchFilter();
        }

        function closeSearchPage() {
            document.getElementById('searchPage').style.display = "none";
            document.body.style.overflow = "auto";
        }

        function executeSearchFilter() {
            const query = document.getElementById('searchInputField').value.toLowerCase().trim();
            const grid = document.getElementById('searchGridResults');
            grid.innerHTML = "";

            if(!window.globalMoviesData) return;

            const matched = globalMoviesData.filter(m => 
                m.title.toLowerCase().includes(query) || 
                (m.desc && m.desc.toLowerCase().includes(query)) ||
                (m.genre && m.genre.toLowerCase().includes(query))
            );

            if(matched.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--text-sub); font-size:13px; margin-top:30px;">${currentLang === 'ar' ? 'لا توجد نتائج مطابقة لفلترة البحث' : 'No matching results found'}</p>`;
                return;
            }

            matched.forEach(movie => {
                const card = document.createElement('div');
                card.className = "movie-card";
                card.style.flex = "unset";
                card.style.width = "100%";
                card.onclick = () => {
                    closeSearchPage();
                    launchVideoPlayerModal(movie);
                };

                const typeBadge = movie.type === 'movie' ? (currentLang === 'ar' ? 'فيلم' : 'Movie') : (currentLang === 'ar' ? 'مسلسل' : 'Series');

                card.innerHTML = `
                    <div class="poster-wrapper" style="height:145px;">
                        <img class="poster-img" src="${movie.poster}" alt="${movie.title}" loading="lazy">
                        <div class="card-rating"><i class="fa-solid fa-star"></i> ${movie.rating}</div>
                        <div class="card-type">${typeBadge}</div>
                    </div>
                    <h4 class="movie-title">${movie.title}</h4>
                `;
                grid.appendChild(card);
            });
        }

        function switchTab(tabId) {
            if(tabId === 'home') {
                closeSearchPage();
                document.getElementById('btnHome').classList.add('active');
            }
        }

        // لوحة التحكم وإدارة العضويات المميزة للمستخدم وحفظ البيانات
        function openProfileModal() {
            document.getElementById('profileModal').style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        function closeProfileModalOnOverlay(e) {
            if(e.target.id === "profileModal") closeProfileModal();
        }

        function submitProfileAuth() {
            const userInp = document.getElementById('usernameInput');
            if(!userInp) {
                // وضع تسجيل الخروج
                localStorage.removeItem('flux_user');
                updateProfileModalUI();
                return;
            }

            const username = userInp.value.trim();
            if(!username) {
                alert(currentLang === 'ar' ? "يرجى كتابة اسم مستخدم صحيح!" : "Please enter a valid username!");
                return;
            }

            const userObj = { username: username, status: "premium" };
            localStorage.setItem('flux_user', JSON.stringify(userObj));
            updateProfileModalUI();
        }

        function updateProfileModalUI() {
            const stored = localStorage.getItem('flux_user');
            const currentUser = stored ? JSON.parse(stored) : null;
            const dict = translations[currentLang];

            const titleNode = document.getElementById('profileTitle');
            const subNode = document.getElementById('profileSub');
            const formBlock = document.getElementById('profileFormBlock');

            if(currentUser) {
                titleNode.innerText = currentUser.username;
                subNode.innerText = currentLang === 'ar' ? "عضو مميز في سينما فلوكس" : "Premium Member in CinemaFlux";
                formBlock.innerHTML = `
                    <button class="modal-btn" style="background-color:#dc3545;" onclick="submitProfileAuth()">${dict.btnLogout}</button>
                `;
            } else {
                titleNode.innerText = dict.userDefaultTitle;
                subNode.innerText = dict.userDefaultSub;
                formBlock.innerHTML = `
                    <input type="text" class="modal-input" id="usernameInput" placeholder="${dict.usernamePlaceholder}">
                    <button class="modal-btn" id="profileSubmitBtn" onclick="submitProfileAuth()">${dict.btnLogin}</button>
                `;
            }
            updateTopNavProfileTriggerUI(currentUser);
        }

        function updateTopNavProfileTriggerUI(currentUser) {
            const titleNode = document.getElementById('profileTitle');
            const subNode = document.getElementById('profileSub');
            const btnNode = document.getElementById('profileSubmitBtn');
            const dict = translations[currentLang];

            if(currentUser) {
                if(titleNode) titleNode.innerText = currentUser.username;
                if(subNode) subNode.innerText = currentLang === 'ar' ? "عضو مميز في سينما فلوكس" : "Premium Member in CinemaFlux";
                if(btnNode) {
                    btnNode.innerText = dict.btnLogout;
                    btnNode.style.backgroundColor = "#dc3545";
                    btnNode.style.color = "#fff";
                }
            } else {
                if(titleNode) titleNode.innerText = dict.userDefaultTitle;
                if(subNode) subNode.innerText = dict.userDefaultSub;
                if(btnNode) {
                    btnNode.innerText = dict.btnLogin;
                    btnNode.style.backgroundColor = "#fff";
                    btnNode.style.color = "#000";
                }
            }
        }

        function shareAppAction() {
            const shareText = currentLang === 'ar' ? "شاهد أحدث الأفلام والمسلسلات مجاناً وبأعلى جودة على سينما فلوكس CinemaFlux!" : "Watch latest movies and series for free in high quality on CinemaFlux!";
            if (navigator.share) {
                navigator.share({
                    title: 'CinemaFlux',
                    text: shareText,
                    url: window.location.href,
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(`${shareText} \n ${window.location.href}`);
                alert(currentLang === 'ar' ? "تم نسخ رابط الموقع بنجاح، يمكنك مشاركته الآن مع أصدقائك!" : "Website link copied successfully, you can share it now with your friends!");
            }
        }
    </script>
</body>
</html>
